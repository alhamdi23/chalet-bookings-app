<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7a4f2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ola Chalet" />
    <title>Ola Chalet</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant splash shown immediately while the app bundle loads.
           React replaces #root contents on mount, removing this automatically. -->
      <div class="app-splash">
        <div class="app-splash__spinner"></div>
      </div>
    </div>
    <style>
      .app-splash {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4e9d7;
      }
      .app-splash__spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #e0cdb0;
        border-top-color: #7a4f2e;
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
